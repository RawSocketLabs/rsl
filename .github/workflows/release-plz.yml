# Conventional Commits -> SemVer, automated by release-plz.
#
# Two jobs run on every push to `main`:
#   * release-plz-pr      — opens/updates a "release" PR that bumps each crate's
#                           version (from the commits since its last tag) and
#                           updates its CHANGELOG.md. Merging that PR is what
#                           actually cuts a release.
#   * release-plz-release — when a release PR is merged (Cargo.toml version no
#                           longer matches a tag), creates the git tag(s) and
#                           publishes the crates that opt in via [[package]]
#                           `publish = true` in release-plz.toml (today: the
#                           bitsandbytes pair). GitHub Releases stay disabled
#                           (`git_release_enable = false`).
#
# Token note: PRs opened with the default GITHUB_TOKEN do NOT trigger other
# workflows (so CI won't run on the release PR). To get CI on the release PR,
# add a Personal Access Token or GitHub App token as the `RELEASE_PLZ_TOKEN`
# secret; the job falls back to GITHUB_TOKEN when it is absent.
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Tag a freshly merged release PR and publish the opted-in crates (no GH release).
  release-plz-release:
    name: release-plz release (tags + scoped publish)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.repository_owner == 'RawSocketLabs' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # crates.io token for the opted-in packages (bitsandbytes, bitsandbytes-macros).
          # Scope the token to those two crates; publishing stays off for everything else
          # via release-plz.toml, not via this token.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Open/update the version-bump + CHANGELOG PR.
  release-plz-pr:
    name: release-plz PR
    # The release job creates tags after a release PR merge. Analyze the next
    # release only after that job finishes so git-only version discovery never
    # races against tag creation and regenerates the release that just merged.
    needs: release-plz-release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.repository_owner == 'RawSocketLabs' }}
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
