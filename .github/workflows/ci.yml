name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect what changed so we only run the jobs a change can actually affect. The heavy
  # bnb-specific jobs (fuzz, public-api, no_std) run only when bitsandbytes changes; the
  # workspace jobs run on any Rust/config change (skipped for docs-only pushes). A change to
  # this workflow itself trips every filter, so CI changes are always fully validated.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      bnb: ${{ steps.filter.outputs.bnb }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            bnb:
              - 'bitsandbytes/**'
              - '.github/workflows/ci.yml'

  fmt:
    name: rustfmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (workspace lints enforce clippy::all = deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: build + test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # bnb feature ladders that aren't on the default path.
      - run: cargo test -p bitsandbytes --features bytes
      - run: cargo test -p bitsandbytes --features mock
      # the rsl facade + rsl-deps blessed stack (pure-Rust slice; FFI excluded).
      - run: cargo build -p rsl --features full
      - run: cargo build -p rsl-deps --features full

  deny:
    name: cargo-deny (advisories / licenses / bans / sources)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV (rust-version = 1.85)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  no_std:
    name: no_std (bare-metal target)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p bitsandbytes --no-default-features
      - run: cargo build --manifest-path bitsandbytes/bnb/nostd-check/Cargo.toml --target thumbv7em-none-eabi

  public-api:
    name: public-api (bitsandbytes surface unchanged)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-17
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-public-api --version 0.52.0 --locked
      - name: Diff the public API against the committed snapshot
        run: |
          cargo public-api -p bitsandbytes --all-features > "$RUNNER_TEMP/public-api.txt"
          if ! diff -u bitsandbytes/bnb/public-api.txt "$RUNNER_TEMP/public-api.txt"; then
            echo "::error::Public API differs from bitsandbytes/bnb/public-api.txt (see diff above)."
            echo "If intentional, regenerate:"
            echo "  cargo +nightly-2026-06-17 public-api -p bitsandbytes --all-features > bitsandbytes/bnb/public-api.txt"
            exit 1
          fi

  fuzz:
    name: cargo-fuzz (bnb decode path, smoke run)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # bitsandbytes is no longer its own workspace root, so cargo-fuzz walks up to the
      # monorepo root; point it at the fuzz crate explicitly with --fuzz-dir.
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz build decode --fuzz-dir bitsandbytes/fuzz
      - run: cargo fuzz run decode --fuzz-dir bitsandbytes/fuzz -- -max_total_time=60 -runs=2000000

  # Single required check: green when every job passed or was legitimately skipped, red if any
  # failed or was cancelled. Point branch protection at this one job, not the individual gated
  # jobs (a skipped required check would otherwise block merges).
  ci-ok:
    name: CI
    if: always()
    needs: [changes, fmt, clippy, test, deny, msrv, no_std, public-api, fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any needed job failed or was cancelled
        run: |
          echo "results: ${{ join(needs.*.result, ' ') }}"
          for r in ${{ join(needs.*.result, ' ') }}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job did not pass."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
