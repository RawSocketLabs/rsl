name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect what changed so we only run the jobs a change can actually affect. The heavy
  # bnb-specific jobs (fuzz, public-api, no_std) run only when bitsandbytes changes; the
  # workspace jobs run on any Rust/config change (skipped for docs-only pushes). A change to
  # this workflow itself trips every filter, so CI changes are always fully validated.
  changes:
    name: detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      bnb: ${{ steps.filter.outputs.bnb }}
      ffi: ${{ steps.filter.outputs.ffi }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'rustfmt.toml'
              - 'deny.toml'
              - '.github/workflows/ci.yml'
            bnb:
              - 'bitsandbytes/**'
              - '.github/workflows/ci.yml'
            ffi:
              - 'usdr/**'
              - 'rust-dsdcc/**'
              - '.github/workflows/ci.yml'

  fmt:
    name: rustfmt
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (workspace lints enforce clippy::all = deny)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: build + test
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # bnb feature ladders that aren't on the default path.
      - run: cargo test -p bitsandbytes --features bytes
      - run: cargo test -p bitsandbytes --features mock
      # rawsock's privileged L3/L2 backends + the protocols' rawsock-injection layers, plus the
      # dns resolver client — all behind opt-in features, off the default path. The `inject`/
      # `link`/`network` capability-consistency tests run unprivileged; the real sends skip.
      - run: cargo test -p rawsock --all-features
      - run: cargo test -p dns --features client
      - run: >
          cargo test --features inject
          -p ip -p icmp -p tcp -p udp -p ethernet -p arp
      # the rsl facade + rsl-deps blessed stack (pure-Rust slice; FFI excluded).
      - run: cargo build -p rsl --features full
      - run: cargo build -p rsl-deps --features full
      # the dual-use demos (compile-check the examples; they run only with CAP_NET_RAW).
      - run: cargo build -p demos --examples

  deny:
    name: cargo-deny (advisories / licenses / bans / sources)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV (rust-version = 1.85)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  no_std:
    name: no_std (bare-metal target)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p bitsandbytes --no-default-features
      - run: cargo build --manifest-path bitsandbytes/bnb/nostd-check/Cargo.toml --target thumbv7em-none-eabi

  public-api:
    name: public-api (bitsandbytes surface unchanged)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-17
      - uses: Swatinem/rust-cache@v2
      # Prebuilt binary (seconds) instead of `cargo install` compiling it from source (minutes).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api@0.52.0
      - name: Diff the public API against the committed snapshot
        run: |
          cargo public-api -p bitsandbytes --all-features > "$RUNNER_TEMP/public-api.txt"
          if ! diff -u bitsandbytes/bnb/public-api.txt "$RUNNER_TEMP/public-api.txt"; then
            echo "::error::Public API differs from bitsandbytes/bnb/public-api.txt (see diff above)."
            echo "If intentional, regenerate:"
            echo "  cargo +nightly-2026-06-17 public-api -p bitsandbytes --all-features > bitsandbytes/bnb/public-api.txt"
            exit 1
          fi

  fuzz:
    name: cargo-fuzz (bnb decode path, smoke run)
    needs: changes
    if: needs.changes.outputs.bnb == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      # bitsandbytes is no longer its own workspace root, so cargo-fuzz walks up to the
      # monorepo root; point it at the fuzz crate explicitly with --fuzz-dir.
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      # Prebuilt binary (seconds) instead of `cargo install` compiling it from source (minutes).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Pin the gnu target: cargo-fuzz otherwise defaults to musl here, whose statically linked
      # libc is incompatible with the ASan sanitizer (and musl std isn't installed).
      - run: cargo fuzz build decode --fuzz-dir bitsandbytes/fuzz --target x86_64-unknown-linux-gnu
      - run: cargo fuzz run decode --fuzz-dir bitsandbytes/fuzz --target x86_64-unknown-linux-gnu -- -max_total_time=60 -runs=2000000

  ffi:
    name: FFI bridges (usdr, dsdcc) — cxx compile check
    needs: changes
    if: needs.changes.outputs.ffi == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y build-essential
      # The FFI crates are excluded workspace members, so check them by manifest path. `cargo
      # check` compiles the cxx bridge (C++ ↔ Rust) and type-checks the Rust, but does NOT link
      # the native libs (libusdr / libdsdcc), which aren't packaged — so this gates API/bridge
      # drift without needing the SDR hardware libraries. usdr's headers are vendored; dsdcc
      # needs DSDcc's headers, cloned here for DSDCC_INCLUDE.
      - name: usdr — cxx bridge check
        run: cargo check --manifest-path usdr/Cargo.toml
      - name: Fetch DSDcc headers
        run: git clone --depth 1 https://github.com/f4exb/dsdcc.git "$RUNNER_TEMP/dsdcc"
      - name: dsdcc — cxx bridge check
        env:
          DSDCC_INCLUDE: ${{ runner.temp }}/dsdcc
        run: cargo check --manifest-path rust-dsdcc/Cargo.toml

  # Single required check: green when every job passed or was legitimately skipped, red if any
  # failed or was cancelled. Point branch protection at this one job, not the individual gated
  # jobs (a skipped required check would otherwise block merges).
  ci-ok:
    name: CI
    if: always()
    needs: [changes, fmt, clippy, test, deny, msrv, no_std, public-api, fuzz, ffi]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Fail if any needed job failed or was cancelled
        run: |
          echo "results: ${{ join(needs.*.result, ' ') }}"
          for r in ${{ join(needs.*.result, ' ') }}; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job did not pass."
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
