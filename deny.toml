# Workspace-wide cargo-deny config for the rsl monorepo. The `rsl-deps` member blesses large
# external ecosystems (tokio/axum/ratatui/…), so duplicate transitive versions are only warned
# on; advisories and licenses are the hard gates. All inter-crate deps are `path` (no git deps).

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# The workspace pulls whole framework trees (via rsl-deps' optional features); duplicate
# versions are unavoidable, so warn rather than fail.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
# No git dependencies — everything owned is an in-workspace path dep.
unknown-git = "deny"
