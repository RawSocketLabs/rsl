# cargo-deny configuration — supply-chain + dependency hygiene.
# Run: `cargo deny check`.

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]

[bans]
# One version of each crate across the tree.
multiple-versions = "deny"
wildcards = "warn"
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
