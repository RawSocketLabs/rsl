# release-plz — per-crate SemVer + CHANGELOG from Conventional Commits (scope = crate name).
# Posture: version + tag in git, do NOT publish to crates.io yet. To start publishing: add a
# CARGO_REGISTRY_TOKEN secret and set publish = true (and git_release_enable = true).
[workspace]
publish = false
# TODO: migrate version discovery to `git_only = true` after establishing a
# packageable tag baseline. The latest tags predate the path + version manifest
# cleanup below, so release-plz cannot package their historical workspaces.
git_release_enable = false
git_tag_enable = true
# Name-prefixed tags so the many crates' tags never collide and map back to their crate.
git_tag_name = "{{ package }}-v{{ version }}"
# Only cut tags after merging a release-plz PR. This is safer with the repo's
# squash-merge workflow and keeps ordinary pushes to main from releasing.
release_always = false
# Release consumer-facing features, fixes, performance work, documentation,
# reverts, and any explicitly breaking Conventional Commit. Lockfile-only
# build(deps) and chore(deps) commits remain visible in git without cascading
# patch releases through every dependent workspace crate.
release_commits = '^(feat|fix|perf|docs|revert)[(:]|^[a-z]+(?:\([^)]*\))?!:'
