# cargo-deny config for the rsl facade. Because rsl blesses large external ecosystems
# (tokio/axum/ratatui/reqwest/prost/…), duplicate transitive versions are expected and
# only warned on; advisories and licenses are the hard gates.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses acceptable for the blessed stack. Add deliberately, never to silence.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

# `usdr` (owned, FFI) ships no `license` field in its manifest yet. It is RSL property under
# the ecosystem's MIT OR Apache-2.0 — assert that here. TODO: add the license field + LICENSE
# files to usdr-lib-rs (same fix rfus received), then drop this clarification.
[[licenses.clarify]]
crate = "usdr"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
# rsl pulls whole framework trees; multiple versions are unavoidable, so warn (don't fail).
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
# Owned RSL crates are pinned git deps — allow git sources.
unknown-git = "allow"
