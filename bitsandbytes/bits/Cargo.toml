[package]
name = "bits"
version = "0.1.0"
edition = "2021"
description = "A Rust crate for working with bitfields and fixed-width integers"
license = "MIT"
repository = "https://github.com/asyio/protocols"

[lib]
proc-macro = true

[dependencies]
syn = { version = "2.0", features = ["full"] }
quote = "1.0"
proc-macro2 = "1.0"
thiserror = "1.0" 