name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (workspace lints enforce clippy::all = deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo test -p bitsandbytes --features bytes

  no_std:
    name: no_std (bare-metal target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      # A host --no-default-features build still links std; the bare-metal target is
      # what actually fails if anything (runtime or generated code) touches std.
      - run: cargo build -p bitsandbytes --no-default-features
      - run: cargo build --manifest-path bnb/nostd-check/Cargo.toml --target thumbv7em-none-eabi

  deny:
    name: cargo-deny (advisories / licenses / bans / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  msrv:
    name: MSRV (rust-version = 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The MSRV job must not be pinned to stable by rust-toolchain.toml.
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
