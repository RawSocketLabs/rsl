name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (workspace lints enforce clippy::all = deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo test -p bitsandbytes --features bytes

  no_std:
    name: no_std (bare-metal target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
      # A host --no-default-features build still links std; the bare-metal target is
      # what actually fails if anything (runtime or generated code) touches std.
      - run: cargo build -p bitsandbytes --no-default-features
      - run: cargo build --manifest-path bnb/nostd-check/Cargo.toml --target thumbv7em-none-eabi

  deny:
    name: cargo-deny (advisories / licenses / bans / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # deny.toml lives in .config/ now. `--config` is a flag on the `check`
          # subcommand, so it must come AFTER it — and this action places
          # `command-arguments` after the subcommand (`arguments` goes before it).
          command-arguments: --config .config/deny.toml

  msrv:
    name: MSRV (rust-version = 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The MSRV job must not be pinned to stable by rust-toolchain.toml.
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  fuzz:
    name: cargo-fuzz (decode path, smoke run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-fuzz needs nightly + ASan/UBSan; rust-toolchain.toml pins the tree to
      # stable, so drop it (same pattern as the MSRV job) and default to nightly.
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      # Build first so a compile break is a clear, fast failure separate from a crash.
      - run: cargo fuzz build decode
      # Time-boxed smoke run: replays the committed seed corpus, then fuzzes briefly.
      # A panic / OOB / UB writes a crash artifact and fails the job. `-runs` caps it
      # so the job is bounded even if `-max_total_time` misbehaves on a slow runner.
      - run: cargo fuzz run decode -- -max_total_time=60 -runs=2000000

  public-api:
    name: public-api (no unintended surface change)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cargo-public-api builds *nightly* rustdoc JSON, whose format drifts between
      # nightlies — so the snapshot is reproducible only against the EXACT toolchain it
      # was generated with. Pin it (the repo's rust-toolchain.toml pins stable, so drop
      # it as the msrv/fuzz jobs do). To change the pin, bump this date AND regenerate
      # the snapshot with the same toolchain (command in the failure message below).
      - run: rm -f rust-toolchain.toml
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-17
      - uses: Swatinem/rust-cache@v2
      # Pin the tool version too — its output format can change across releases.
      - run: cargo install cargo-public-api --version 0.52.0 --locked
      - name: Diff the public API against the committed snapshot
        run: |
          cargo public-api -p bitsandbytes --all-features > "$RUNNER_TEMP/public-api.txt"
          if ! diff -u bnb/public-api.txt "$RUNNER_TEMP/public-api.txt"; then
            echo "::error::Public API differs from bnb/public-api.txt (see diff above)."
            echo "If the change is intentional, regenerate the snapshot:"
            echo "  cargo +nightly-2026-06-17 public-api -p bitsandbytes --all-features > bnb/public-api.txt"
            exit 1
          fi

  semver-checks:
    name: cargo-semver-checks (no breakage since last release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the release tags for the baseline
      # cargo-semver-checks builds rustdoc JSON on *stable* (via RUSTC_BOOTSTRAP), so the
      # repo's pinned-stable toolchain is fine — no nightly needed.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Pin the tool version — its lint set / output can change across releases.
      - run: cargo install cargo-semver-checks --version 0.48.0 --locked
      - name: Check the runtime crate against the latest release tag
        run: |
          # The runtime crate is tagged `v{version}`; the macro crate uses a name-prefixed
          # tag, so the `v*` glob selects only the runtime crate's releases. Baseline auto-
          # advances as new releases are tagged.
          baseline=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$baseline" ]; then
            echo "No v* release tag yet — nothing to baseline against; skipping."
            exit 0
          fi
          echo "Baseline: $baseline"
          # Blocking: a SemVer-breaking change vs the last release fails until the version
          # is bumped (release-plz drives the bump from a `feat!`/`BREAKING CHANGE:`; on
          # 0.x that's a minor bump). The proc-macro crate has no library API surface, so
          # only the runtime crate is checked — its macros are re-exported and covered here.
          cargo semver-checks --baseline-rev "$baseline" -p bitsandbytes
